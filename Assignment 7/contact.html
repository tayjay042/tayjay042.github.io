<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <h1>Crunch Fitness</h1>
    </header>
    <main>
        <a class="btn" href="index.html">Return Home</a>
        <form action="">
            <label for="firstName">First Name:</label>
            <input type="text" id="firstName" placeholder="Enter First Name"> <br><br>
            <label for="lastName">Last Name:</label>
            <input type="text" id="lastName" placeholder="Enter Last Name"> <br><br>
            <label for="number">Phone Number:</label>
            <input type="tel" id="number" placeholder="Enter Phone Number"><br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter Email"><br><br>
            <label for="hearUs">How did you hear about us?</label>
            <select name="Hear Us" id="hearUs" placeholder="Enter Email">
                <option value="" disabled selected>Select one below</option>
                <option value="insta">Instagram</option>
                <option value="facebook">Facebook</option>
                <option value="twitter">X</option>
                <option value="tiktok">TikTok</option>
                <option value="friend">Friend</option>
                <option value="other">Other</option>
            </select><br><br>
            <hr>
            <input type="radio" id="beginner" name="skillLevel" value="Beginner">
            <label for="beginner">Beginner</label><br>
            <input type="radio" id="intermediate" name="skillLevel" value="Intermediate">
            <label for="intermediate">Intermediate</label><br>
            <input type="radio" id="pro" name="skillLevel" value="Pro">
            <label for="pro">Pro</label><br>
            <input type="radio" id="expert" name="skillLevel" value="Expert">
            <label for="expert">Expert</label><br><br>
            <Label for="newsLetter">Would you like us to send you obnoxious spam emails?</Label><br>
            <input type="radio" id="spam" name="spam" value="Yes">
            <label for="">Yes</label><br>
            <input type="radio" id="spam" name="spam" value="No">
            <label for="">No</label><br><br>
            <Label for="favLifts">Select all the lifts you enjoy</Label><br>
            <input type="checkbox" id="favLifts" name="favLifts" value="Squat">
            <label for="">Squat</label><br>
            <input type="checkbox" id="favLifts" name="favLifts" value="BenchPress">
            <label for="">Bench Press</label><br>
            <input type="checkbox" id="favLifts" name="favLifts" value="Deadlift">
            <label for="">Deadlift</label><br>
            <input type="checkbox" id="favLifts" name="favLifts" value="Curl">
            <label for="">Bicep Curl</label><br>
            <hr>
            <label for="question">What to you hope to gain from the gym?</label><br>
            <textarea name="" id="bio" rows="10" cols="30"></textarea><br><br>
            <input type="submit" value="Submit">
        </form>
        <hr>
    </main>
    <footer>
        <h5><em>This webpage is brought to you by Taylor Welson Production</em></h5>
        <h6><strong>Copr. 2026 Taylor Welson. All rights reserved</strong></h6>
    </footer>
</body>

</html>
